const app = initializeApp(firebaseConfig);

// =========================
// DEVICE ID
// =========================
function getDeviceId(){
  let id = localStorage.getItem("device_id");

  if(!id){
    id = "dev_" + Math.random().toString(36).substr(2, 10);
    localStorage.setItem("device_id", id);
  }

  return id;
}
async function validarLicenca(){

  let codigo = document.getElementById("licencaInput").value;

  const ref = doc(db, "licencas", codigo);
  const snap = await getDoc(ref);

  if(!snap.exists()){
    alert("Licença inválida");
    return;
  }

  const licenca = snap.data();

  let agora = Date.now();

  if(agora > licenca.fim){
    alert("Licença expirada");
    return;
  }

  let deviceId = getDeviceId();

  if(!licenca.dispositivos.includes(deviceId)){

    if(licenca.dispositivos.length >= licenca.limiteDispositivos){
      alert("Limite de dispositivos atingido");
      return;
    }

    licenca.dispositivos.push(deviceId);

    await updateDoc(ref, {
      dispositivos: licenca.dispositivos
    });
  }

  localStorage.setItem("licenca", JSON.stringify(licenca));

  alert("Licença ativada com sucesso!");
}
// =========================
// VERIFICAR ACESSO
// =========================
window.verificarAcesso = function(e, formula){

  e.preventDefault();

  let licenca = JSON.parse(localStorage.getItem("licenca"));

  if(!licenca){
    alert("🔒 Compre o plano");
    return;
  }

  let agora = Date.now();

  if(agora > licenca.fim){
    alert("❌ Licença expirada");
    localStorage.removeItem("licenca");
    return;
  }

  let deviceId = getDeviceId();

  if(!licenca.dispositivos.includes(deviceId)){

    if(licenca.dispositivos.length >= licenca.limiteDispositivos){
      alert("Limite de dispositivos atingido");
      return;
    }

    licenca.dispositivos.push(deviceId);
    localStorage.setItem("licenca", JSON.stringify(licenca));
  }

  window.location.href = "Calculadora.html?f=" + formula;
};
