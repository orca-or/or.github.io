<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TALA - Canal</title>

<style>
body { margin:0; background:black; overflow:hidden; font-family:Arial; }

video {
    width:100%;
    height:100vh;
    object-fit:fill;
}

.menu-pai {
    display:flex;
    height:100px;
    background:black;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
}

.titulo { cursor:pointer; }

.program-title {
    color:red;
    font-size:26px;
    cursor:pointer;
    opacity:1;
    transition:opacity 0.6s ease;
}

.fade-out { opacity:0; }
.fade-in { opacity:1; }

.program-description {
    display:none;
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:60%;
    background:rgba(0,0,0,0.9);
    padding:20px;
    border-radius:10px;
    color:white;
    z-index:1000;
}

.program-list {
    display:none;
    position:absolute;
    top:110px;
    right:20px;
    width:260px;
    background:rgba(0,0,0,0.85);
    padding:15px;
    color:white;
    z-index:999;
}

.program-list li {
    cursor:pointer;
    margin:8px 0;
}
</style>
</head>

<body>

<nav class="menu-pai">
    <div class="titulo" id="logo">
        <img src="img/talalogotipo.png">
    </div>

    <div id="program-title" class="program-title"></div>
</nav>

<video id="tv" autoplay muted    disablePictureInPicture></video>

<div id="program-description" class="program-description"></div>

<div id="program-list" class="program-list">
    <h3>Programação</h3>
    <ul id="program-ul"></ul>
</div>

<script>
const playlist = [

         
{ src: "img/relogio.mp4", duracao: 60, titulo: " ", descricao: "Informação indisponível", horario: "06:01" },      
{ src: "video/Diamond-Nani.mp4", duracao: 199, titulo: "Nani-Diamond Platinumz ", descricao: "Informação indisponível", horario: "06:1 à 06:04" },
{ src: "video/Ferre_Gola_Marathon.mp4", duracao: 308, titulo: "Marathon-Ferre Gola ", descricao: "Informação indisponível", horario: "06:04 à 06:09" },
{ src: "video/forever-young.mp4", duracao: 334, titulo: "Forever young- Jayz ", descricao: "Informação indisponível", horario: "06:09 à 06:15" },
{ src: "video/manipulado-1.mp4", duracao: 3174, titulo: "Manipulado-Ep1 ", descricao: "Informação indisponível", horario: "06:15 à 07:07" },
{ src: "video/programação.mp4", duracao: 15, titulo: " ", descricao: "Informação indisponível", horario: "07:07" },
{ src: "video/Coração_Traído_Capítulo_01.mp4", duracao: 2859, titulo: "Coração traído-Ep1 ", descricao: "Informação indisponível", horario: "07:07 à 07:54" },
{ src: "video/O-JUSTICEIRO.mp4", duracao: 5745, titulo: "O justiçeiro ", descricao: "Informação indisponível", horario: "07:54 à 09:31" },
{ src: "video/troca-de-coração.mp4", duracao: 5227, titulo: "Troca de corações ", descricao: "Informação indisponível", horario: "09:31 à 10:58" },
{ src: "video/KORO_NO_SHOUKANSHI_EP1(0).mp4", duracao: 1420, titulo: "Koro no shou kanshi -Ep1 ", descricao: "Informação indisponível", horario: "10:58 à 11:21" },
{ src: "video/a-garota-perfeita.mp4", duracao: 5209, titulo: "A garota perfeita ", descricao: "Informação indisponível", horario: "11:21 à 12:47" },
{ src: "video/a-múmia.mp4", duracao: 4821, titulo: "A ressurreição da múmia ", descricao: "Informação indisponível", horario: "12:47 à 14:09 " },
{ src: "video/Fazendo-as-Pazes-com-o-Passado.mp4", duracao: 5549, titulo: "Fazendo as pazes com o passado ", descricao: "Informação indisponível", horario: "14:09 à 15:42" },
{ src: "video/O-sequestro-de-ídem.mp4", duracao: 5426, titulo: "O sequestro de ídem ", descricao: "Informação indisponível", horario: "15:42 à 17:12" },
{ src: "video/Esquadrão-lobo.mp4", duracao:7557 , titulo: "Esquadrão lobo ", descricao: "Informação indisponível", horario: "17:12 à 19:18" },
{ src: "video/A_maldição_da_freira.mp4", duracao: 4581, titulo: "A maldição da freira", descricao: "Informação indisponível", horario: "19:18 à 20:34" },
{ src: "video/O_Caçador_de_Recompensas.mp4", duracao: 4432 , titulo: "O caçador de recompensas", descricao: "Informação indisponível", horario: "20:34 à 21:48" },
{ src: "video/DONZELA.mp4", duracao: 5668 , titulo: "Donzela", descricao: "Informação indisponível", horario: "21:48 à 23:22 " },
{ src: "video/Comemoração-sangrenta.mp4", duracao: 4743 , titulo: "Comemoração sangrenta", descricao: "Informação indisponível", horario: "23:21 à 00:40" },

{ src: "video/relogio.mp4", duracao: 60, titulo: " ", descricao: "Informação indisponível", horario: "00:40" },


];

const inicioCanal = new Date("2026-10-07:13:02").getTime();

const player = document.getElementById("tv");
const programTitle = document.getElementById("program-title");
const programDesc = document.getElementById("program-description");
const programList = document.getElementById("program-list");
const programUl = document.getElementById("program-ul");

let atualIndex = 0;
let textoAtual = "";
let proximoMostrado = false;
let inicioAviso = 0;

// 🔥 Renderizar lista mostrando só programas futuros
function renderList(){
    const agora = Date.now();
    programUl.innerHTML="";
    let algumFuturo = false;

    playlist.forEach((item,i)=>{
        const fimItem = inicioCanal + playlist.slice(0,i+1).reduce((a,b)=>a+b.duracao*1000,0);
        if(fimItem < agora) return; // já passou
        algumFuturo = true;

        const li = document.createElement("li");
        li.textContent = `${item.horario} - ${item.titulo}`;
        li.onclick = (e)=>{
            e.stopPropagation();
            programDesc.style.display="block";
            programDesc.innerHTML = `<h2>${item.titulo}</h2><p>${item.descricao}</p><small>${item.horario}</small>`;
        };
        programUl.appendChild(li);
    });

    // Se todos os programas passaram, reinicia removidos
    if(!algumFuturo){
        localStorage.removeItem("removidos"); // limpa o histórico
        renderList(); // renderiza novamente desde o início
    }
}

// 🎬 fade título
function setTitulo(novoTexto){
    if(textoAtual === novoTexto) return;
    programTitle.classList.add("fade-out");
    setTimeout(()=>{
        programTitle.textContent = novoTexto;
        programTitle.classList.remove("fade-out");
        programTitle.classList.add("fade-in");
        textoAtual = novoTexto;
    },300);
}

// ⏱️ TV
function syncTV(){
    const agora = Date.now();
    const tempo = Math.floor((agora - inicioCanal)/1000);
    const total = playlist.reduce((a,b)=>a+b.duracao,0);
    const t = tempo % total;

    let acc=0;
    let inicioAtual=0;
    for(let i=0;i<playlist.length;i++){
        if(t < acc + playlist[i].duracao){
            atualIndex = i;
            inicioAtual = acc;
            break;
        }
        acc += playlist[i].duracao;
    }

    const atual = playlist[atualIndex];
    const proximo = playlist[(atualIndex+1)%playlist.length];
    const tempoDentro = t - inicioAtual;
    const restante = atual.duracao - tempoDentro;

    // vídeo
    if(!player.src.includes(atual.src)){
        player.src = atual.src;
        player.onloadedmetadata = ()=>{
            player.currentTime = tempoDentro;
            player.play();
        }
    }

    // Próximo programa aparece 5 min antes, 30s
    if(restante <= 300 && !proximoMostrado){
        inicioAviso = Date.now();
        proximoMostrado = true;
        setTitulo("A seguir: " + proximo.titulo);
    } 
    else if(proximoMostrado){
        if(Date.now() - inicioAviso < 30000){
            setTitulo("A seguir: " + proximo.titulo);
        } else {
            setTitulo(atual.titulo);
        }
    } else {
        setTitulo(atual.titulo);
    }

    if(restante > 300){
        proximoMostrado = false;
    }

    renderList();
}

// 🖱️ logo
document.getElementById("logo").onclick = (e)=>{
    e.stopPropagation();
    programList.style.display="block";
};

// 🖱️ título → descrição
programTitle.onclick = (e)=>{
    e.stopPropagation();
    const atual = playlist[atualIndex];
    programDesc.style.display="block";
    programDesc.innerHTML = `<h2>${atual.titulo}</h2><p>${atual.descricao}</p><small>${atual.horario}</small>`;
};

// 🔊 som
player.onclick = ()=> player.muted=false;

// fechar lista e descrição clicando fora
document.addEventListener("click", ()=>{
    programList.style.display="none";
    programDesc.style.display="none";
});

setInterval(syncTV,1000);
syncTV();
renderList();
</script>

</body>
</html>
